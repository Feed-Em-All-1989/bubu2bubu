<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bubu2bubu</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div id="sidebar-header">
        <h1>bubu2bubu</h1>
        <span id="status-dot" class="offline"></span>
      </div>
      <div id="identity">
        <span id="pubkey-label">your key</span>
        <code id="pubkey"></code>
      </div>
      <div id="connect-panel">
        <input id="name-input" type="text" placeholder="username" />
        <input id="addr-input" type="text" placeholder="server ip:port" />
        <button id="btn-connect">connect</button>
      </div>
      <div id="server-info" class="hidden">
        <span id="server-addr-label"></span>
      </div>
    </aside>
    <main id="chat">
      <div id="chat-header">
        <span id="chat-title">chat</span>
        <button id="btn-labubu" title="toggle stego images">labubu</button>
      </div>
      <div id="messages"></div>
      <div id="reply-bar" class="hidden">
        <span id="reply-preview"></span>
        <button id="btn-cancel-reply">x</button>
      </div>
      <div id="input-bar">
        <input id="msg-input" type="text" placeholder="message" />
        <button id="btn-send">send</button>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
