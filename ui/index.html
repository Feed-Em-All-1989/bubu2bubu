<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bubu2bubu</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div id="sidebar-header">
        <h1>bubu2bubu</h1>
        <span id="status-dot" class="offline"></span>
      </div>
      <div id="identity">
        <span id="pubkey-label">your key</span>
        <code id="pubkey"></code>
      </div>
      <div id="connect-panel">
        <input id="name-input" type="text" placeholder="username" />
        <input id="addr-input" type="text" placeholder="server ip:port" />
        <button id="btn-connect">connect</button>
      </div>
      <div id="server-info" class="hidden">
        <span id="server-addr-label"></span>
        <div id="stego-key-display">
          <span id="stego-key-label">encryption key</span>
          <code id="stego-key-value"></code>
          <button id="btn-copy-key" title="copy to clipboard">copy</button>
        </div>
      </div>
    </aside>
    <main id="chat">
      <div id="chat-header">
        <span id="chat-title">chat</span>
        <button id="btn-labubu" title="toggle stego images">labubu</button>
      </div>
      <div id="messages"></div>
      <div id="reply-bar" class="hidden">
        <span id="reply-preview"></span>
        <button id="btn-cancel-reply">x</button>
      </div>
      <div id="input-bar">
        <input id="msg-input" type="text" placeholder="message" />
        <button id="btn-send">send</button>
      </div>
    </main>
  </div>
  <div id="key-prompt-overlay" class="hidden">
    <div id="key-prompt">
      <span id="key-prompt-title">server room key</span>
      <code id="key-prompt-value"></code>
      <span id="key-prompt-hint">accept to use this key, or enter your own</span>
      <input id="key-prompt-input" type="text" placeholder="paste your own key" />
      <div id="key-prompt-actions">
        <button id="btn-accept-key">accept server key</button>
        <button id="btn-use-custom-key">use my key</button>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
